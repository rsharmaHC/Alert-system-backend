# =============================================================================
# PYTEST CONFIGURATION
# =============================================================================

[pytest]
# Test discovery
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test execution
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=60
    --maxfail=5
    -ra

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, redis, celery)
    api: API endpoint tests
    security: Security-related tests
    slow: Slow-running tests
    requires_db: Tests requiring PostgreSQL
    requires_redis: Tests requiring Redis
    requires_celery: Tests requiring Celery worker
    external_api: Tests calling external APIs (Twilio, SES, Photon)

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Logging for test output
log_level = INFO

# Database test configuration
env =
    TEST_DATABASE_URL=postgresql://postgres:postgres@localhost:5432/tm_alert_test
    TEST_REDIS_URL=redis://localhost:6379/15
    SECRET_KEY=test-secret-key-for-testing-only-32chars
    TWILIO_ACCOUNT_SID=
    TWILIO_AUTH_TOKEN=
    AWS_ACCESS_KEY_ID=
    AWS_SECRET_ACCESS_KEY=

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::sqlalchemy.exc.SAWarning

# Timeout for slow tests (in seconds)
timeout = 300

# Asyncio mode
asyncio_mode = auto

# =============================================================================
# COVERAGE CONFIGURATION
# =============================================================================

[coverage:run]
source = app
branch = True
omit =
    app/tests/*
    app/__pycache__/*
    */venv/*
    */__pycache__/*
    app/main.py  # Startup code
    app/config.py  # Config loading
    app/celery_app.py  # Celery config

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    if settings.APP_ENV == "production"
    # Debug/development code
    if settings.DEBUG
    except ImportError

[coverage:html]
directory = htmlcov
title = TM Alert Test Coverage

[coverage:xml]
output = coverage.xml

