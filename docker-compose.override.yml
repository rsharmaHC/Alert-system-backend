version: "3.9"

services:
  api:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=development

  celery_worker:
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 --pool=solo
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=development

  celery_beat:
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=development

  db:
    ports:
      - "127.0.0.1:5433:5432"  # Localhost only — for local DB tools

  redis:
    ports:
      - "127.0.0.1:6380:6379"  # Localhost only — for local debugging
