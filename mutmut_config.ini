"""
Mutation Testing Configuration

Tools:
- mutmut: Mutation testing for Python
- cosmic-ray: Alternative mutation testing tool

Usage:
    # Run mutation testing with mutmut
    mutmut run
    
    # Show results
    mutmut results
    
    # Show specific mutation
    mutmut show <id>
    
    # Apply mutation for testing
    mutmut apply <id>
    
    # Run specific test against mutations
    mutmut run --tests-dir=app/tests
"""

# Configuration for mutmut
[mutmut]
# Paths to mutate
paths_to_mutate = app/

# Paths to exclude
exclude_paths = */tests/*,*/venv/*,*/__pycache__/*,app/tests/*

# Test runner
runner = pytest app/tests/unit -x

# Use coverage to speed up mutation testing
use_coverage = true

# Show times
show_times = true

# Number of jobs (parallel)
jobs = 4

# Test timeout in milliseconds
test_timeout = 10000

# Disable progress bar (for CI)
disable_progress = false
