# Railway Beat Service Configuration
# ===================================
# This file configures the Celery Beat service (scheduler)
# Beat does NOT have HTTP endpoints, so healthcheck is DISABLED

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Beat service has NO HTTP endpoint - healthcheck DISABLED
# Railway will monitor the process instead
healthcheckPath = ""
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Environment variables for Beat service
[deploy.env]
SERVICE_TYPE = "beat"
