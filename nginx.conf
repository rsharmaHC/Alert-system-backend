# =============================================================================
# TM Alert - Production Nginx Configuration
# OWASP Security Hardened Configuration
# =============================================================================

# Security: Run nginx as non-root user
# user nginx;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Increase security with optimized worker connections
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ==========================================================================
    # SECURITY HEADERS - Applied globally
    # ==========================================================================

    # Hide nginx version
    server_tokens off;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking protection - block all iframe embedding
    add_header X-Frame-Options "DENY" always;

    # Force HTTPS for 1 year, include subdomains, enable preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy - restrict resource loading
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' http://localhost:8000 https://api.qrserver.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    # Disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # Prevent caching of sensitive responses
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    # Disable DNS prefetching
    add_header X-DNS-Prefetch-Control "off" always;

    # Additional security headers
    add_header X-Download-Options "noopen" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ==========================================================================
    # PERFORMANCE & SECURITY SETTINGS
    # ==========================================================================

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Custom error pages (create these in your frontend build)
    # error_page 403 /403.html;
    # error_page 404 /404.html;
    # error_page 500 502 503 504 /50x.html;

    # Logging format with security-relevant fields
    log_format security '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log security;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Buffer size limits (prevent buffer overflow attacks)
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 10M;
    large_client_header_buffers 2 1k;

    # Rate limiting zone (prevent brute force)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Block malicious user agents
    if ($http_user_agent ~* (curl|wget|httplib|python-requests|scrapy|nikto|nmap|sqlmap|nessus|openvas)) {
        return 403;
    }

    # ==========================================================================
    # FRONTEND SERVER
    # ==========================================================================

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # Redirect all HTTP to HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name localhost;

        # ==========================================================================
        # SSL/TLS Configuration (Let's Encrypt)
        # ==========================================================================

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern SSL configuration (Mozilla SSL Config Generator)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # DH parameters (generate with: openssl dhparam -out dhparam.pem 4096)
        # ssl_dhparam /etc/nginx/ssl/dhparam.pem;

        root /usr/share/nginx/html;
        index index.html;

        # ==========================================================================
        # SECURITY: Block sensitive files and directories
        # ==========================================================================

        # Block access to hidden files (.git, .env, etc.)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 403;
        }

        # Block access to sensitive file extensions
        location ~* \.(git|env|htaccess|htpasswd|ini|log|sh|sql|conf|bak|swp|dist|rar|zip|tar|gz|tgz)$ {
            deny all;
            access_log off;
            log_not_found off;
            return 403;
        }

        # ==========================================================================
        # FRONTEND ROUTING
        # ==========================================================================

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # SPA routing - all routes go to index.html
        location / {
            try_files $uri $uri/ /index.html;
            
            # Security headers for frontend
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }

        # ==========================================================================
        # BACKEND API PROXY
        # ==========================================================================

        location /api/ {
            proxy_pass http://localhost:8000;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering off;
            
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://localhost:8000/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }
    }
}
