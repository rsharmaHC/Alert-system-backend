# Railway Service Configuration
# ================================
# This file configures the API service (web server)
# Workers and Beat services should use their respective config files

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# API service has HTTP endpoint, so healthcheck is enabled
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Environment variables for API service
[deploy.env]
SERVICE_TYPE = "api"
