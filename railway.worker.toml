# Railway Worker Service Configuration
# =====================================
# This file configures the Celery Worker service
# Workers do NOT have HTTP endpoints, so healthcheck is DISABLED

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Worker service has NO HTTP endpoint - healthcheck DISABLED
# Railway will monitor the process instead
healthcheckPath = ""
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Environment variables for Worker service
[deploy.env]
SERVICE_TYPE = "worker"
