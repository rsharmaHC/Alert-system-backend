version: "3.9"

services:
  db:
    image: postgres:16-alpine
    # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB are supplied from the
    # local .env file — no credential literals in version control
    # (security review finding D-C1).
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NO ports exposed — only reachable via internal Docker network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # NO ports exposed — only reachable via internal Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    # DATABASE_URL / REDIS_URL come from .env (loaded via env_file below).
    environment:
      - ENVIRONMENT=production
    env_file:
      - .env
    # Use Python rather than curl — curl is not installed in python:3.11-slim
    # (security review D-M5). /health returns 200 when uvicorn is ready.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build: .
    environment:
      - ENVIRONMENT=production
      - SERVICE_TYPE=worker
    env_file:
      - .env
    healthcheck:
      # `celery inspect ping` round-trips through the broker, so this also
      # verifies Redis connectivity.
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME", "--timeout=5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build: .
    environment:
      - ENVIRONMENT=production
      - SERVICE_TYPE=beat
    env_file:
      - .env
    healthcheck:
      # Verify the beat scheduler has written a fresh heartbeat to its
      # schedule file within the last 2 minutes (celery beat writes every
      # tick).
      test:
        - CMD
        - python
        - -c
        - "import os,time,sys; p='/app/celerybeat-schedule'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<120 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: