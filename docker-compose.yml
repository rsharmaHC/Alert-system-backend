version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=tm_alert
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NO ports exposed — only reachable via internal Docker network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # NO ports exposed — only reachable via internal Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/tm_alert
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build: .
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/tm_alert
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - SERVICE_TYPE=worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build: .
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/tm_alert
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - SERVICE_TYPE=beat
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: